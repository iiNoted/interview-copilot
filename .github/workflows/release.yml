name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build all 8 branded products on each platform
  # ---------------------------------------------------------------------------
  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot Ai", appId: "com.sourcethread.interview-copilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck" }
    env:
      # macOS code signing (Developer ID Application certificate as base64 .p12)
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      # macOS notarization (Apple ID + app-specific password)
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: mkdir -p pipeline-data models

      - name: Generate product config
        run: |
          # Determine notarize setting based on whether Apple credentials are available
          NOTARIZE="false"
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            NOTARIZE="true"
          fi
          cat > electron-builder.product.yml << CONF
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          mac:
            target:
              - target: dmg
                arch:
                  - arm64
            entitlements: build/entitlements.mac.plist
            entitlementsInherit: build/entitlements.mac.plist
            extendInfo:
              - NSMicrophoneUsageDescription: "${{ matrix.product.name }} needs microphone access for real-time interview transcription."
              - LSUIElement: false
            notarize: ${NOTARIZE}
          dmg:
            artifactName: ${{ matrix.product.id }}-\${version}.\${ext}
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package DMG (arm64)
        run: npx electron-vite build && npx electron-builder --config electron-builder.product.yml --mac dmg --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.product.id }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot Ai", appId: "com.sourcethread.interview-copilot", identity: "SourceThread.InterviewCopilotAi" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready", identity: "SourceThread.HireReady" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen", identity: "SourceThread.TechScreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire", identity: "SourceThread.DataHire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep", identity: "SourceThread.CloudPrep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost", identity: "SourceThread.InterviewGhost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews", identity: "SourceThread.SAPInterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck", identity: "SourceThread.PrepDeck" }
    env:
      # Windows code signing
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: |
          if not exist pipeline-data mkdir pipeline-data
          if not exist models mkdir models
        shell: cmd

      - name: Generate product config
        shell: bash
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          win:
            executableName: ${{ matrix.product.id }}
            target:
              - target: nsis
                arch: [x64]
          nsis:
            artifactName: ${{ matrix.product.id }}-${version}-setup.${ext}
            shortcutName: "${{ matrix.product.name }}"
            uninstallDisplayName: "${{ matrix.product.name }}"
            createDesktopShortcut: always
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package Windows installer
        run: npm run build && npx electron-builder --config electron-builder.product.yml --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.product.id }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build AppX packages for Microsoft Store (unsigned — Microsoft signs them)
  # ---------------------------------------------------------------------------
  build-appx:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot Ai", appId: "com.sourcethread.interview-copilot", identity: "SourceThread.InterviewCopilotAi" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready", identity: "SourceThread.HireReady" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen", identity: "SourceThread.TechScreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire", identity: "SourceThread.DataHire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep", identity: "SourceThread.CloudPrep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost", identity: "SourceThread.InterviewGhost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews", identity: "SourceThread.SAPInterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck", identity: "SourceThread.PrepDeck" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: |
          if not exist pipeline-data mkdir pipeline-data
          if not exist models mkdir models
        shell: cmd

      - name: Generate AppX config
        shell: bash
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          win:
            executableName: ${{ matrix.product.id }}
            target:
              - target: appx
                arch: [x64]
            forceCodeSigning: false
          appx:
            identityName: ${{ matrix.product.identity }}
            publisher: "CN=0CDA11DF-D1DB-4A54-9BA0-432EED1E0924"
            publisherDisplayName: "SourceThread"
            applicationId: ${{ matrix.product.id }}
            displayName: "${{ matrix.product.name }}"
            artifactName: ${{ matrix.product.id }}-${version}.${ext}
            languages:
              - en-US
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package AppX
        run: npm run build && npx electron-builder --config electron-builder.product.yml --win --publish never

      - name: Upload AppX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appx-${{ matrix.product.id }}
          path: dist/*.appx
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot Ai", appId: "com.sourcethread.interview-copilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: mkdir -p pipeline-data models

      - name: Generate product config
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          linux:
            target:
              - AppImage
              - deb
            maintainer: sourcethread.com
            category: Utility
          appImage:
            artifactName: ${{ matrix.product.id }}-${version}.${ext}
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package Linux
        run: npm run build && npx electron-builder --config electron-builder.product.yml --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.product.id }}
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach all artifacts + per-brand update manifests
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-appx, build-linux]
    if: always() && (needs.build-mac.result == 'success' || needs.build-win.result == 'success' || needs.build-linux.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate per-brand auto-update manifests
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          PRODUCTS="copilot hireready techscreen datahire cloudprep interviewghost sapinterviews prepdeck"

          # Helper: generate a manifest YAML for one platform+product
          gen_manifest() {
            local FILE="$1" OUT="$2"
            if [ ! -f "$FILE" ]; then
              echo "WARNING: $FILE not found, skipping manifest $OUT"
              return 1
            fi
            local SHA=$(sha512sum "$FILE" | awk '{print $1}' | xxd -r -p | base64 -w0)
            local SIZE=$(stat -c%s "$FILE")
            local NAME=$(basename "$FILE")
            printf "version: %s\nfiles:\n  - url: %s\n    sha512: %s\n    size: %s\npath: %s\nsha512: %s\nreleaseDate: '%s'\n" \
              "$VERSION" "$NAME" "$SHA" "$SIZE" "$NAME" "$SHA" "$DATE" > "$OUT"
            echo "Generated: $OUT -> $NAME ($SIZE bytes)"
          }

          # Generate manifests for each brand
          for PID in $PRODUCTS; do
            # Windows: latest.yml
            WIN_EXE="artifacts/win-${PID}/${PID}-${VERSION}-setup.exe"
            gen_manifest "$WIN_EXE" "artifacts/${PID}-latest.yml" || true

            # macOS: latest-mac.yml
            MAC_DMG="artifacts/mac-${PID}/${PID}-${VERSION}.dmg"
            gen_manifest "$MAC_DMG" "artifacts/${PID}-latest-mac.yml" || true

            # Linux: latest-linux.yml
            LIN_AI="artifacts/linux-${PID}/${PID}-${VERSION}.AppImage"
            gen_manifest "$LIN_AI" "artifacts/${PID}-latest-linux.yml" || true
          done

          # Also generate the default (non-prefixed) manifests for copilot brand
          # These are what the auto-updater looks for by default
          [ -f "artifacts/copilot-latest.yml" ] && cp "artifacts/copilot-latest.yml" "artifacts/latest.yml"
          [ -f "artifacts/copilot-latest-mac.yml" ] && cp "artifacts/copilot-latest-mac.yml" "artifacts/latest-mac.yml"
          [ -f "artifacts/copilot-latest-linux.yml" ] && cp "artifacts/copilot-latest-linux.yml" "artifacts/latest-linux.yml"

          echo ""
          echo "=== Generated manifests ==="
          for f in artifacts/*.yml artifacts/*-latest*.yml; do
            [ -f "$f" ] && echo "--- $f ---" && cat "$f" && echo ""
          done

      - name: Validate required artifacts exist
        run: |
          ERRORS=0
          # At minimum, copilot brand should have all platforms
          for f in artifacts/latest.yml artifacts/latest-mac.yml artifacts/latest-linux.yml; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required manifest: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "WARNING: $ERRORS manifests missing — release will proceed but auto-update may not work for all platforms"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.dmg.blockmap
            artifacts/**/*.exe
            artifacts/**/*.exe.blockmap
            artifacts/**/*.appx
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/latest.yml
            artifacts/latest-mac.yml
            artifacts/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish AppX packages to Microsoft Store (bypasses SmartScreen)
  # ---------------------------------------------------------------------------
  publish-store:
    runs-on: windows-latest
    needs: [build-appx]
    if: needs.build-appx.result == 'success' && !contains(github.ref_name, '-alpha') && vars.ENABLE_STORE_PUBLISH == 'true'
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, storeId: "9MTCPJ47W0WR" }
          - { id: hireready, storeId: "9P95VLD9208G" }
          - { id: techscreen, storeId: "9N1JJLN1QRL9" }
          - { id: datahire, storeId: "PLACEHOLDER_DATAHIRE" }
          - { id: cloudprep, storeId: "PLACEHOLDER_CLOUDPREP" }
          - { id: interviewghost, storeId: "PLACEHOLDER_INTERVIEWGHOST" }
          - { id: sapinterviews, storeId: "PLACEHOLDER_SAPINTERVIEWS" }
          - { id: prepdeck, storeId: "PLACEHOLDER_PREPDECK" }
    steps:
      - name: Download AppX artifacts
        uses: actions/download-artifact@v4
        with:
          name: appx-${{ matrix.product.id }}
          path: artifacts

      - name: List AppX files
        run: Get-ChildItem -Recurse artifacts/*.appx

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure Store credentials
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
            --sellerId ${{ secrets.MS_SELLER_ID }} `
            --clientId ${{ secrets.AZURE_AD_CLIENT_ID }} `
            --clientSecret ${{ secrets.AZURE_AD_CLIENT_SECRET }}

      - name: Publish ${{ matrix.product.id }} to Microsoft Store
        run: |
          $appx = Get-ChildItem -Recurse artifacts/*.appx | Select-Object -First 1
          Write-Host "Publishing $($appx.FullName) to Store ID ${{ matrix.product.storeId }}"
          msstore publish $appx.FullName -id ${{ matrix.product.storeId }}

      - name: Check submission status
        run: msstore submission status ${{ matrix.product.storeId }}
        continue-on-error: true

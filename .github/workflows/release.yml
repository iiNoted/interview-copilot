name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build all 8 branded products on each platform
  # ---------------------------------------------------------------------------
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot", appId: "com.sourcethread.interview-copilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck" }
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: mkdir -p pipeline-data models

      - name: Generate product config
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          mac:
            target:
              - target: dmg
                arch:
                  - arm64
            entitlements: build/entitlements.mac.plist
            entitlementsInherit: build/entitlements.mac.plist
            extendInfo:
              - NSMicrophoneUsageDescription: "${{ matrix.product.name }} needs microphone access for real-time interview transcription."
              - LSUIElement: false
            notarize: false
          dmg:
            artifactName: ${{ matrix.product.id }}-${version}.${ext}
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package DMG (arm64)
        run: npx electron-vite build && npx electron-builder --config electron-builder.product.yml --mac dmg --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.product.id }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot", appId: "com.sourcethread.interview-copilot", identity: "SourceThread.InterviewCopilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready", identity: "SourceThread.HireReady" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen", identity: "SourceThread.TechScreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire", identity: "SourceThread.DataHire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep", identity: "SourceThread.CloudPrep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost", identity: "SourceThread.InterviewGhost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews", identity: "SourceThread.SAPInterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck", identity: "SourceThread.PrepDeck" }
    env:
      # Use signing cert when available, otherwise build unsigned
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: |
          if not exist pipeline-data mkdir pipeline-data
          if not exist models mkdir models
        shell: cmd

      - name: Generate product config
        shell: bash
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          win:
            executableName: ${{ matrix.product.id }}
            target:
              - target: nsis
                arch: [x64]
          nsis:
            artifactName: ${{ matrix.product.id }}-${version}-setup.${ext}
            shortcutName: "${{ matrix.product.name }}"
            uninstallDisplayName: "${{ matrix.product.name }}"
            createDesktopShortcut: always
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package Windows installer
        run: npm run build && npx electron-builder --config electron-builder.product.yml --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.product.id }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build AppX packages for Microsoft Store (unsigned — Microsoft signs them)
  # ---------------------------------------------------------------------------
  build-appx:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot", appId: "com.sourcethread.interview-copilot", identity: "SourceThread.InterviewCopilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready", identity: "SourceThread.HireReady" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen", identity: "SourceThread.TechScreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire", identity: "SourceThread.DataHire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep", identity: "SourceThread.CloudPrep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost", identity: "SourceThread.InterviewGhost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews", identity: "SourceThread.SAPInterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck", identity: "SourceThread.PrepDeck" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: |
          if not exist pipeline-data mkdir pipeline-data
          if not exist models mkdir models
        shell: cmd

      - name: Generate AppX config
        shell: bash
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          win:
            executableName: ${{ matrix.product.id }}
            target:
              - target: appx
                arch: [x64]
            forceCodeSigning: false
          appx:
            identityName: ${{ matrix.product.identity }}
            publisher: "CN=0CDA11DF-D1DB-4A54-9BA0-432EED1E0924"
            publisherDisplayName: "Source Thread LLC"
            applicationId: ${{ matrix.product.id }}
            displayName: "${{ matrix.product.name }}"
            artifactName: ${{ matrix.product.id }}-${version}.${ext}
            languages:
              - en-US
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package AppX
        run: npm run build && npx electron-builder --config electron-builder.product.yml --win --publish never

      - name: Upload AppX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appx-${{ matrix.product.id }}
          path: dist/*.appx
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product:
          - { id: copilot, name: "Interview Copilot", appId: "com.sourcethread.interview-copilot" }
          - { id: hireready, name: "HireReady", appId: "com.sourcethread.hireready" }
          - { id: techscreen, name: "TechScreen", appId: "com.sourcethread.techscreen" }
          - { id: datahire, name: "DataHire", appId: "com.sourcethread.datahire" }
          - { id: cloudprep, name: "CloudPrep", appId: "com.sourcethread.cloudprep" }
          - { id: interviewghost, name: "InterviewGhost", appId: "com.sourcethread.interviewghost" }
          - { id: sapinterviews, name: "SAPInterviews", appId: "com.sourcethread.sapinterviews" }
          - { id: prepdeck, name: "PrepDeck", appId: "com.sourcethread.prepdeck" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create empty extraResources dirs
        run: mkdir -p pipeline-data models

      - name: Generate product config
        run: |
          cat > electron-builder.product.yml << 'CONF'
          appId: ${{ matrix.product.appId }}
          productName: "${{ matrix.product.name }}"
          copyright: "Copyright © 2026 SourceThread"
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          extraResources:
            - from: "pipeline-data/"
              to: "pipeline-data"
              filter:
                - "*/articles/*.md"
                - "*/skill/skill_scaffold.json"
            - from: "models/"
              to: "models"
              filter:
                - "*.bin"
          linux:
            target:
              - AppImage
              - deb
            maintainer: sourcethread.com
            category: Utility
          appImage:
            artifactName: ${{ matrix.product.id }}-${version}.${ext}
          npmRebuild: false
          publish:
            provider: github
            owner: iiNoted
            repo: interview-copilot
            releaseType: release
          CONF

      - name: Build & package Linux
        run: npm run build && npx electron-builder --config electron-builder.product.yml --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.product.id }}
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach all artifacts
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-appx, build-linux]
    if: always() && (needs.build-mac.result == 'success' || needs.build-win.result == 'success' || needs.build-linux.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate auto-update manifests
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Windows: latest.yml (from copilot NSIS exe)
          WIN_EXE=$(find artifacts -name "copilot-*-setup.exe" | head -1)
          if [ -n "$WIN_EXE" ]; then
            WIN_SHA=$(sha512sum "$WIN_EXE" | awk '{print $1}' | xxd -r -p | base64 -w0)
            WIN_SIZE=$(stat -c%s "$WIN_EXE")
            WIN_NAME=$(basename "$WIN_EXE")
            cat > artifacts/latest.yml << EOF
          version: ${VERSION}
          files:
            - url: ${WIN_NAME}
              sha512: ${WIN_SHA}
              size: ${WIN_SIZE}
          path: ${WIN_NAME}
          sha512: ${WIN_SHA}
          releaseDate: '${DATE}'
          EOF
          fi

          # macOS: latest-mac.yml (from copilot DMG)
          MAC_DMG=$(find artifacts -name "copilot-*.dmg" | head -1)
          if [ -n "$MAC_DMG" ]; then
            MAC_SHA=$(sha512sum "$MAC_DMG" | awk '{print $1}' | xxd -r -p | base64 -w0)
            MAC_SIZE=$(stat -c%s "$MAC_DMG")
            MAC_NAME=$(basename "$MAC_DMG")
            cat > artifacts/latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: ${MAC_NAME}
              sha512: ${MAC_SHA}
              size: ${MAC_SIZE}
          path: ${MAC_NAME}
          sha512: ${MAC_SHA}
          releaseDate: '${DATE}'
          EOF
          fi

          # Linux: latest-linux.yml (from copilot AppImage)
          LIN_AI=$(find artifacts -name "copilot-*.AppImage" | head -1)
          if [ -n "$LIN_AI" ]; then
            LIN_SHA=$(sha512sum "$LIN_AI" | awk '{print $1}' | xxd -r -p | base64 -w0)
            LIN_SIZE=$(stat -c%s "$LIN_AI")
            LIN_NAME=$(basename "$LIN_AI")
            cat > artifacts/latest-linux.yml << EOF
          version: ${VERSION}
          files:
            - url: ${LIN_NAME}
              sha512: ${LIN_SHA}
              size: ${LIN_SIZE}
          path: ${LIN_NAME}
          sha512: ${LIN_SHA}
          releaseDate: '${DATE}'
          EOF
          fi

          echo "Generated update manifests:"
          cat artifacts/latest.yml 2>/dev/null || true
          cat artifacts/latest-mac.yml 2>/dev/null || true
          cat artifacts/latest-linux.yml 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.appx
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/latest.yml
            artifacts/latest-mac.yml
            artifacts/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish AppX packages to Microsoft Store (bypasses SmartScreen)
  # ---------------------------------------------------------------------------
  publish-store:
    runs-on: windows-latest
    needs: [build-appx]
    if: needs.build-appx.result == 'success' && !contains(github.ref_name, '-alpha')
    strategy:
      fail-fast: false
      matrix:
        product:
          - { id: copilot, storeId: "PLACEHOLDER_COPILOT" }
          - { id: hireready, storeId: "PLACEHOLDER_HIREREADY" }
          - { id: techscreen, storeId: "PLACEHOLDER_TECHSCREEN" }
          - { id: datahire, storeId: "PLACEHOLDER_DATAHIRE" }
          - { id: cloudprep, storeId: "PLACEHOLDER_CLOUDPREP" }
          - { id: interviewghost, storeId: "PLACEHOLDER_INTERVIEWGHOST" }
          - { id: sapinterviews, storeId: "PLACEHOLDER_SAPINTERVIEWS" }
          - { id: prepdeck, storeId: "PLACEHOLDER_PREPDECK" }
    steps:
      - name: Download AppX artifacts
        uses: actions/download-artifact@v4
        with:
          name: appx-${{ matrix.product.id }}
          path: artifacts

      - name: List AppX files
        run: Get-ChildItem -Recurse artifacts/*.appx

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure Store credentials
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
            --sellerId ${{ secrets.MS_SELLER_ID }} `
            --clientId ${{ secrets.AZURE_AD_CLIENT_ID }} `
            --clientSecret ${{ secrets.AZURE_AD_CLIENT_SECRET }}

      - name: Publish ${{ matrix.product.id }} to Microsoft Store
        run: |
          $appx = Get-ChildItem -Recurse artifacts/*.appx | Select-Object -First 1
          Write-Host "Publishing $($appx.FullName) to Store ID ${{ matrix.product.storeId }}"
          msstore publish $appx.FullName -id ${{ matrix.product.storeId }}

      - name: Check submission status
        run: msstore submission status ${{ matrix.product.storeId }}
        continue-on-error: true

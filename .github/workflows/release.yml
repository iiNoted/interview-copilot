name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS — DMG (arm64) with code signing + notarization
  # ---------------------------------------------------------------------------
  build-mac:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package DMG (arm64)
        run: electron-vite build && electron-builder --mac dmg --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS — Mac App Store .pkg (arm64)
  # ---------------------------------------------------------------------------
  build-mas:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAS_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > build/embedded.provisionprofile

      - name: Install dependencies
        run: npm ci

      - name: Build & package MAS pkg (arm64)
        run: electron-vite build && electron-builder --mac mas --arm64 --publish never

      - name: Upload MAS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-mas
          path: |
            dist/*.pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — NSIS installer with optional code signing
  # ---------------------------------------------------------------------------
  build-win:
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package Windows installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux — AppImage + deb
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package Linux
        run: npm run build && npx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach all artifacts
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build-win, build-linux]
    if: always() && (needs.build-win.result == 'success' || needs.build-linux.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            artifacts/mac-dmg/*.dmg
            artifacts/mac-mas/*.pkg
            artifacts/win-installer/*.exe
            artifacts/linux-packages/*.AppImage
            artifacts/linux-packages/*.deb
            artifacts/linux-packages/*.snap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
